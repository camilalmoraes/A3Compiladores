<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transpilador FIN</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0d0f;
    --surface: #13131a;
    --border:  #1e1e2e;
    --accent:  #7ee8a2;
    --accent2: #38bdf8;
    --accent3: #f472b6;
    --error:   #f87171;
    --warn:    #fbbf24;
    --text:    #e2e8f0;
    --muted:   #4a5568;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-fin {
    background: var(--accent); color: #0d0d0f;
    padding: 2px 10px; font-size: 0.9rem;
    clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  }
  .logo-py  { color: var(--accent2); }
  .logo-run { color: var(--accent3); }

  .header-btns { display: flex; gap: 10px; }

  .btn {
    border: none; cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.78rem;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 20px; transition: all 0.2s;
    clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  }
  .btn-transpile { background: var(--accent);  color: #0d0d0f; }
  .btn-run       { background: var(--accent3); color: #0d0d0f; }
  .btn:hover     { filter: brightness(1.15); transform: translateY(-1px); }
  .btn:active    { transform: translateY(0); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .toolbar-label {
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 0.65rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }
  .example-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 4px 12px;
    font-family: 'Space Mono', monospace; font-size: 0.68rem;
    cursor: pointer; transition: all 0.2s;
  }
  .example-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Três painéis ── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    flex: 1;
    min-height: 420px;
  }

  .panel {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    min-height: 0;
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 7px 14px;
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .ph-fin   { color: var(--accent);  background: rgba(126,232,162,0.05); }
  .ph-py    { color: var(--accent2); background: rgba(56,189,248,0.05); }
  .ph-out   { color: var(--accent3); background: rgba(244,114,182,0.05); }

  .badge {
    font-size: 0.58rem; padding: 2px 8px; border-radius: 2px; letter-spacing: 1px;
  }
  .badge-fin { background: rgba(126,232,162,0.15); color: var(--accent); }
  .badge-py  { background: rgba(56,189,248,0.15);  color: var(--accent2); }
  .badge-out { background: rgba(244,114,182,0.15); color: var(--accent3); }

  .editor-wrap { display: flex; flex: 1; overflow: hidden; }

  .line-numbers {
    padding: 14px 10px 14px 0; min-width: 40px; text-align: right;
    color: var(--muted); font-size: 0.72rem; line-height: 1.6rem;
    background: rgba(0,0,0,0.2); border-right: 1px solid var(--border);
    user-select: none; overflow: hidden;
  }

  textarea, .code-display {
    flex: 1; padding: 14px; background: transparent;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 0.78rem; line-height: 1.6rem;
    border: none; outline: none; resize: none;
    tab-size: 4; white-space: pre; overflow: auto;
  }
  textarea { caret-color: var(--accent); }
  textarea::selection { background: rgba(126,232,162,0.2); }
  .code-display { color: var(--accent2); }

  /* ── Painel de saída ── */
  .output-panel { display: flex; flex-direction: column; }

  .inputs-area {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    background: rgba(0,0,0,0.2);
  }
  .inputs-label {
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .inputs-field {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 0.75rem;
    padding: 8px 10px; resize: vertical; min-height: 60px;
    outline: none; line-height: 1.5rem;
  }
  .inputs-field:focus { border-color: var(--accent3); }
  .inputs-hint {
    font-size: 0.62rem; color: var(--muted); margin-top: 4px;
  }

  .run-output {
    flex: 1; padding: 14px;
    font-family: 'Space Mono', monospace; font-size: 0.78rem;
    line-height: 1.6rem; overflow: auto; white-space: pre-wrap;
    color: var(--accent3);
  }
  .run-output.has-error { color: var(--error); }

  /* ── Status bar ── */
  .status-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    font-size: 0.72rem; max-height: 120px; overflow-y: auto;
  }
  .status-header {
    padding: 7px 14px; font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); transition: background 0.3s;
  }
  .status-dot.ok    { background: var(--accent);  box-shadow: 0 0 6px var(--accent); }
  .status-dot.error { background: var(--error);   box-shadow: 0 0 6px var(--error); }
  .status-dot.run   { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }

  .status-messages { padding: 6px 14px 10px; }
  .msg { padding: 3px 0; display: flex; gap: 8px; align-items: flex-start; }
  .msg-error { color: var(--error); }
  .msg-ok    { color: var(--accent); }
  .msg-run   { color: var(--accent3); }
  .msg-info  { color: var(--accent2); }

  /* Syntax highlight */
  .kw-fin  { color: var(--accent);  font-weight: 700; }
  .kw-py   { color: #c084fc;        font-weight: 700; }
  .str-lit { color: var(--warn); }
  .num-lit { color: #fb923c; }
  .comment { color: var(--muted); font-style: italic; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .panels, .status-bar { animation: fadeIn 0.35s ease both; }

  /* ── Terminal interativo ── */
  .terminal {
    flex: 1; padding: 14px; overflow-y: auto;
    font-family: 'Space Mono', monospace; font-size: 0.78rem;
    line-height: 1.7rem; background: #0a0a0c;
  }
  .term-line { display: block; white-space: pre-wrap; word-break: break-all; }
  .term-saida { color: var(--accent3); }
  .term-input { color: #a3e635; }
  .term-erro  { color: var(--error); }
  .term-info  { color: var(--muted); font-style: italic; }

  .terminal-input-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: #0a0a0c;
  }
  .terminal-prompt { color: var(--accent3); font-size: 1rem; }
  .terminal-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #a3e635; font-family: 'Space Mono', monospace;
    font-size: 0.78rem; caret-color: #a3e635;
  }

</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-fin">FIN</span>
    <span style="color:var(--muted)">→</span>
    <span class="logo-py">Python</span>
    <span style="color:var(--muted)">→</span>
    <span class="logo-run">Saída</span>
    <span style="color:var(--muted);font-size:0.65rem;margin-left:8px;font-family:'Syne',sans-serif;">transpilador</span>
  </div>
  <div class="header-btns">
    <button class="btn btn-transpile" onclick="transpile()">▶ Transpilar</button>
    <button class="btn btn-run"       onclick="executar()">⚡ Executar</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Arquivos .fin:</span>
  <select id="fileSelect" onchange="carregarArquivo(this.value)"
    style="background:var(--surface);border:1px solid var(--border);
           color:var(--text);font-family:'Space Mono',monospace;
           font-size:0.68rem;padding:5px 10px;cursor:pointer;outline:none;min-width:160px;">
    <option value="">-- selecionar --</option>
  </select>
  <button class="example-btn" onclick="recarregarLista()" title="Atualizar lista">&#8635; atualizar</button>
</div>

<div class="panels">

  <!-- Painel 1: Editor FIN -->
  <div class="panel">
    <div class="panel-header ph-fin">
      <span>Linguagem FIN</span>
      <span class="badge badge-fin">Finlandês</span>
    </div>
    <div class="editor-wrap">
      <div class="line-numbers" id="lineNumbers">1</div>
      <textarea id="finEditor" spellcheck="false"
        placeholder="Digite seu código FIN aqui..."
        oninput="updateLineNumbers(); autoTranspile();"
        onkeydown="handleTab(event)"
      ></textarea>
    </div>
  </div>

  <!-- Painel 2: Python gerado -->
  <div class="panel">
    <div class="panel-header ph-py">
      <span>Python 3 gerado</span>
      <span class="badge badge-py">Output</span>
    </div>
    <div class="editor-wrap">
      <div class="line-numbers" id="lineNumbersPy">1</div>
      <div class="code-display" id="pyOutput"></div>
    </div>
  </div>

  <!-- Painel 3: Terminal Interativo -->
  <div class="panel output-panel">
    <div class="panel-header ph-out">
      <span>Terminal</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="execStatus" class="badge badge-out">aguardando</span>
        <button id="stopBtn" onclick="pararExecucao()"
          style="display:none;background:var(--error);border:none;color:#fff;
                 font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;
                 letter-spacing:1px;padding:2px 10px;cursor:pointer;">■ PARAR</button>
      </div>
    </div>
    <div id="terminal" class="terminal"></div>
    <div class="terminal-input-wrap" id="inputWrap" style="display:none">
      <span class="terminal-prompt">›</span>
      <input id="terminalInput" class="terminal-input" type="text"
        placeholder="Digite e pressione Enter..."
        onkeydown="handleInputKey(event)" autocomplete="off" spellcheck="false"/>
    </div>
  </div>
    <div class="inputs-area">
      <div class="inputs-label">Entradas (input)</div>
      <textarea class="inputs-field" id="inputsField"
        placeholder="Se o programa usar lue(), digite os valores aqui&#10;Um por linha&#10;Ex: 10&#10;20"></textarea>
      <div class="inputs-hint">Um valor por linha, na ordem que o programa vai pedir</div>
    </div>
  </div>

</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-header">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusLabel">aguardando entrada</span>
  </div>
  <div class="status-messages" id="statusMessages">
    <div class="msg msg-info">
      <span>ℹ</span>
      <span>Digite código FIN, clique em Transpilar e depois Executar.</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script>
const FIN_KEYWORDS = ['ohj','lop','kok','des','tek','tot','jos','muu',
  'kun','var','do','lue','kir','totta','vaara','ja','tai','ei','de','ate'];
const PY_KEYWORDS  = ['if','else','while','for','in','range','print',
  'input','int','float','str','bool','True','False','and','or','not','break'];

// ── Highlight ────────────────────────────────────────────────
function highlightPY(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/'([^']*)'/g, '<span class="str-lit">\'$1\'</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="num-lit">$1</span>')
    .replace(/#.*/g, '<span class="comment">$&</span>')
    .replace(new RegExp(`\\b(${PY_KEYWORDS.join('|')})\\b`,'g'),
      '<span class="kw-py">$1</span>');
}

// ── Números de linha ─────────────────────────────────────────
function updateLineNumbers() {
  const n = document.getElementById('finEditor').value.split('\n').length;
  document.getElementById('lineNumbers').innerHTML =
    Array.from({length: n}, (_,i) => i+1).join('<br>');
}
function updatePyLineNumbers(code) {
  const n = code ? code.split('\n').length : 1;
  document.getElementById('lineNumbersPy').innerHTML =
    Array.from({length: n}, (_,i) => i+1).join('<br>');
}

// ── Tab ───────────────────────────────────────────────────────
function handleTab(e) {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const ta = e.target, s = ta.selectionStart;
  ta.value = ta.value.substring(0,s) + '    ' + ta.value.substring(ta.selectionEnd);
  ta.selectionStart = ta.selectionEnd = s + 4;
}

// ── Transpilação ─────────────────────────────────────────────
let debounceTimer;
let lastPythonCode = '';

function autoTranspile() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(transpile, 600);
}

async function transpile() {
  const source = document.getElementById('finEditor').value;
  if (!source.trim()) {
    setStatus('aguardando entrada', '', []);
    document.getElementById('pyOutput').innerHTML = '';
    updatePyLineNumbers('');
    lastPythonCode = '';
    return;
  }

  try {
    const res    = await fetch('/transpilar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({codigo: source})
    });
    const result = await res.json();

    if (!result.erro) {
      lastPythonCode = result.python;
      document.getElementById('pyOutput').innerHTML = highlightPY(result.python);
      updatePyLineNumbers(result.python);
      setStatus('transpilação concluída — clique em ⚡ Executar', 'ok', [
        {type:'ok', msg:`${result.python.split('\n').length} linhas geradas com sucesso.`}
      ]);
    } else {
      lastPythonCode = '';
      document.getElementById('pyOutput').innerHTML = '';
      updatePyLineNumbers('');
      setStatus('erros encontrados', 'error', [
        {type:'error', msg: result.erro}
      ]);
    }
  } catch(e) {
    setStatus('servidor offline', 'error', [
      {type:'error', msg:'Não foi possível conectar. Rode: python app.py'}
    ]);
  }
}


// ── Status ───────────────────────────────────────────────────
function setStatus(label, state, messages) {
  document.getElementById('statusDot').className = 'status-dot' + (state ? ` ${state}` : '');
  document.getElementById('statusLabel').textContent = label;
  document.getElementById('statusMessages').innerHTML = messages.map(m => `
    <div class="msg msg-${m.type}">
      <span>${m.type==='error'?'✕':m.type==='ok'?'✓':m.type==='run'?'⚡':'ℹ'}</span>
      <span>${m.msg}</span>
    </div>`).join('');
}

// ── Carregar arquivos .fin ───────────────────────────────────
async function recarregarLista() {
  try {
    const res  = await fetch('/testes');
    const data = await res.json();
    const sel  = document.getElementById('fileSelect');
    sel.innerHTML = '<option value="">-- selecionar --</option>';
    data.arquivos.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error('Erro ao listar testes:', e);
  }
}

async function carregarArquivo(nome) {
  if (!nome) return;
  try {
    const res  = await fetch('/testes/' + nome);
    const data = await res.json();
    if (data.erro) {
      setStatus('erro ao carregar arquivo', 'error', [{type:'error', msg: data.erro}]);
      return;
    }
    document.getElementById('finEditor').value = data.conteudo;
    document.getElementById('inputsField').value = '';
    updateLineNumbers();
    transpile();
    setStatus('arquivo carregado: ' + nome, 'ok', [{type:'ok', msg: 'Arquivo ' + nome + ' carregado com sucesso.'}]);
  } catch(e) {
    setStatus('servidor offline', 'error', [{type:'error', msg:'Não foi possível conectar ao servidor.'}]);
  }
}

// ── Init ─────────────────────────────────────────────────────
recarregarLista();

// ── Socket.IO ────────────────────────────────────────────────
const socket = io();
let executando = false;

socket.on('saida', (data) => {
  addTermLine(data.texto, data.tipo);
  if (data.tipo === 'saida') {
    // Mostra input após cada linha de saída (aguarda resposta)
    showInput(true);
  }
});

socket.on('fim', () => {
  executando = false;
  showInput(false);
  setExecStatus('finalizado', false);
  document.getElementById('stopBtn').style.display = 'none';
  addTermLine('--- programa finalizado ---', 'info');
});

function addTermLine(texto, tipo) {
  const term = document.getElementById('terminal');
  const span = document.createElement('span');
  span.className = `term-line term-${tipo}`;
  span.textContent = texto;
  term.appendChild(span);
  term.scrollTop = term.scrollHeight;
}

function showInput(show) {
  document.getElementById('inputWrap').style.display = show ? 'flex' : 'none';
  if (show) {
    setTimeout(() => document.getElementById('terminalInput').focus(), 50);
  }
}

function handleInputKey(e) {
  if (e.key !== 'Enter') return;
  const input = document.getElementById('terminalInput');
  const valor = input.value;
  input.value = '';
  showInput(false);
  socket.emit('enviar_input', { valor });
}

function executar() {
  if (!lastPythonCode) {
    addTermLine('Transpile o código primeiro.', 'erro');
    return;
  }

  // Limpa terminal
  document.getElementById('terminal').innerHTML = '';
  showInput(false);
  executando = true;
  setExecStatus('executando...', true);
  document.getElementById('stopBtn').style.display = 'inline-block';

  socket.emit('iniciar_execucao', { codigo: lastPythonCode });
}

function pararExecucao() {
  socket.emit('parar_execucao');
  addTermLine('--- execução interrompida ---', 'info');
}

function setExecStatus(texto, ativo) {
  const el = document.getElementById('execStatus');
  el.textContent = texto;
  el.style.background = ativo ? 'rgba(244,114,182,0.3)' : 'rgba(244,114,182,0.15)';
}

</script>
</body>
</html>
